<!doctype html>
<html lang="en">
  <head>
    <title>Rate a Movie</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <h1 class="mt-5">Rate a Movie</h1>
      <a href="/" class="btn btn-secondary mb-3">Home</a>
      <form action="{{ url_for('rate_movie') }}" method="post">
        <label for="title">Title:</label><br />
        <input type="text" id="title" name="title" required /><br />
        <label for="rating">Rating (0-100):</label><br />
        <input type="number" id="rating" name="rating" min="0" max="100" required /><br />
        <button type="submit" class="btn btn-success mt-3">Submit Rating</button>
      </form>
    </div>
  </body>
</html>
