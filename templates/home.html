<!DOCTYPE html>
<html lang="en">
<head>
    <title>Film Database</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <div class="mt-5 mb-4">
            <h1>🎬 Film Database</h1>
        </div>
        <div class="mt-3">
            <a href="/add-movie" class="btn btn-primary mr-2">Add Film</a>
            <a href="/delete-movie" class="btn btn-danger mr-2">Delete Film</a>
            <a href="/update-movie" class="btn btn-secondary mr-2">Update Film</a>
            <a href="/display-movies" class="btn btn-info">Display All Films</a>
        </div>
    </div>
</body>
</html>
